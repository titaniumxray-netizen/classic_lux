<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NavaStore – Shop</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <style>
    * { font-family: 'Inter', sans-serif; }
    body.dark { background: #0f172a; color: #e2e8f0; }
    body.dark .bg-white { background: #1e293b; }
    body.dark .border-gray-200 { border-color: #334155; }
    body.dark .text-gray-600, body.dark .text-gray-500 { color: #cbd5e6; }
    body.dark .bg-gray-100 { background: #334155; }
    .product-card:hover { transform: translateY(-5px); box-shadow: 0 12px 24px -12px rgba(0,0,0,0.2); transition: all 0.25s; }
    .category-chip.active { background: #1f2937 !important; color: white !important; }
    .mobile-menu { position: fixed; top: 0; right: 0; width: 260px; height: 100%; background: white; transform: translateX(100%); transition: 0.3s; z-index: 1000; }
    .mobile-menu.open { transform: translateX(0); }
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); opacity: 0; visibility: hidden; transition: 0.3s; z-index: 999; }
    .overlay.active { opacity: 1; visibility: visible; }
  </style>
</head>
<body>
<header class="sticky top-0 z-50 bg-white/90 backdrop-blur border-b">
  <div class="max-w-7xl mx-auto px-5 py-4 flex justify-between items-center">
    <a href="index.html" class="text-2xl font-bold">NavaStore</a>
    <nav class="hidden md:flex gap-6 text-sm font-medium">
      <a href="index.html">Home</a><a href="products.html">Shop</a><a href="about.html">About</a><a href="contact.html">Contact</a>
    </nav>
    <div class="flex gap-3">
      <button id="themeBtn" class="p-2 rounded-full bg-gray-100">🌙</button>
      <button id="menuBtn" class="md:hidden p-2">☰</button>
    </div>
  </div>
  <div class="px-5 pb-3 md:hidden"><input type="text" id="mobileSearch" placeholder="Search..." class="w-full p-2 rounded-full border bg-gray-50 text-sm"></div>
</header>
<div id="mobileMenu" class="mobile-menu p-6 flex flex-col gap-6 bg-white"><button id="closeMenu" class="self-end text-2xl">&times;</button><a href="index.html">Home</a><a href="products.html">Shop</a><a href="about.html">About</a><a href="contact.html">Contact</a></div>
<div id="overlay" class="overlay"></div>

<main class="max-w-7xl mx-auto px-5 py-12">
  <div class="flex flex-wrap justify-between items-center border-b pb-4 mb-6">
    <h2 class="text-2xl font-semibold">All Products</h2>
    <div id="categoryChips" class="flex flex-wrap gap-2"></div>
  </div>
  <div class="hidden md:block mb-6"><input type="text" id="searchInput" placeholder="Search products..." class="w-64 p-2 rounded-full border bg-gray-50"></div>
  <div id="productGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8"></div>
  <div id="productCount" class="text-center text-gray-500 mt-8"></div>
</main>

<footer class="border-t py-8 text-center text-sm text-gray-500">
  © 2025 NavaStore. <a href="about.html" class="underline">About</a> | <a href="contact.html" class="underline">Contact</a>
</footer>

<div id="modal" class="fixed inset-0 bg-black/50 backdrop-blur hidden items-center justify-center z-50 p-4">
  <div class="bg-white rounded-2xl max-w-md w-full p-5 relative">
    <button id="closeModal" class="absolute top-3 right-4 text-2xl">&times;</button>
    <img id="modalImg" class="w-full h-56 object-cover rounded-xl mb-4">
    <h2 id="modalName" class="text-xl font-bold"></h2>
    <p id="modalDesc" class="text-gray-600 mt-2"></p>
    <p id="modalPrice" class="text-2xl font-bold mt-3"></p>
    <button id="modalWhatsapp" class="mt-5 w-full bg-gray-900 text-white py-2 rounded-xl">Buy on WhatsApp</button>
  </div>
</div>

<script>
  const products = [
    { id:1, name:"Navi Polo Shirt", price:12000, category:"Men's Clothing", image:"https://images.pexels.com/photos/428338/pexels-photo-428338.jpeg?auto=compress&cs=tinysrgb&w=600", desc:"Premium combed cotton polo, breathable, 4 colors." },
    { id:2, name:"Smart LED TV 43\"", price:130000, category:"Electronics", image:"https://images.pexels.com/photos/811838/pexels-photo-811838.jpeg?auto=compress&cs=tinysrgb&w=600", desc:"4K Ultra HD Smart TV, Chromecast built-in, HDR10." },
    { id:3, name:"Standard Fan", price:22000, category:"Home Appliances", image:"https://images.pexels.com/photos/264523/pexels-photo-264523.jpeg?auto=compress&cs=tinysrgb&w=600", desc:"Heavy-duty stand fan, 3 speeds, quiet motor." },
    { id:4, name:"Microwave Oven", price:65000, category:"Home Appliances", image:"https://images.pexels.com/photos/4614400/pexels-photo-4614400.jpeg?auto=compress&cs=tinysrgb&w=600", desc:"800W solo microwave, 20L capacity, digital controls." },
    { id:5, name:"Cookware Set (12pcs)", price:55000, category:"Home & Kitchen", image:"https://images.pexels.com/photos/1279330/pexels-photo-1279330.jpeg?auto=compress&cs=tinysrgb&w=600", desc:"Non-stick granite coating, dishwasher safe." },
    { id:6, name:"Air Fryer 5L", price:89000, category:"Home Appliances", image:"https://images.pexels.com/photos/6489663/pexels-photo-6489663.jpeg?auto=compress&cs=tinysrgb&w=600", desc:"Oil-less, 8 presets, rapid air circulation." },
    { id:7, name:"Floral Dress", price:18500, category:"Women's Clothing", image:"https://images.pexels.com/photos/1183266/pexels-photo-1183266.jpeg?auto=compress&cs=tinysrgb&w=600", desc:"Elegant midi dress, lightweight viscose." },
    { id:8, name:"Leather Handbag", price:45000, category:"Elbows & Bags", image:"https://images.pexels.com/photos/1152077/pexels-photo-1152077.jpeg?auto=compress&cs=tinysrgb&w=600", desc:"Genuine leather tote, spacious interior." },
    { id:9, name:"Soundbar", price:78000, category:"Electronics", image:"https://images.pexels.com/photos/5843990/pexels-photo-5843990.jpeg?auto=compress&cs=tinysrgb&w=600", desc:"2.1 channel, 120W, wireless subwoofer." },
    { id:10, name:"Coffee Maker", price:35000, category:"Home & Kitchen", image:"https://images.pexels.com/photos/414630/pexels-photo-414630.jpeg?auto=compress&cs=tinysrgb&w=600", desc:"Drip machine, 1.5L, keep-warm function." }
  ];
  let currentCategory="all", searchTerm="";
  function sendWhatsApp(p){ window.open(`https://wa.me/2349162572175?text=${encodeURIComponent(`Hello, I want to buy ${p.name} for ₦${p.price.toLocaleString()}.`)}`,'_blank'); }
  function renderCats(){ const cats=["all",...new Set(products.map(p=>p.category))]; document.getElementById("categoryChips").innerHTML=cats.map(c=>`<button class="category-chip px-4 py-2 bg-gray-100 rounded-full text-sm ${currentCategory===c?'active':''}" data-cat="${c}">${c==='all'?'All':c}</button>`).join(""); document.querySelectorAll(".category-chip").forEach(btn=>btn.addEventListener("click",()=>{currentCategory=btn.dataset.cat; renderCats(); renderProducts();})); }
  function renderProducts(){ const filtered=products.filter(p=>(currentCategory==="all"||p.category===currentCategory) && (p.name.toLowerCase().includes(searchTerm)||p.desc.toLowerCase().includes(searchTerm))); document.getElementById("productCount").innerText=`${filtered.length} products`; const grid=document.getElementById("productGrid"); if(!filtered.length){grid.innerHTML=`<div class="col-span-full text-center py-12">No products found</div>`; return;} grid.innerHTML=filtered.map(p=>`<div class="product-card bg-white border rounded-2xl overflow-hidden shadow-sm"><img src="${p.image}" class="w-full h-56 object-cover" loading="lazy"><div class="p-4"><h3 class="font-bold text-lg">${p.name}</h3><p class="text-gray-500 text-sm mt-1">${p.desc.substring(0,70)}...</p><p class="text-xl font-bold mt-2">₦${p.price.toLocaleString()}</p><div class="flex gap-3 mt-4"><button class="buy-btn flex-1 bg-gray-900 text-white py-2 rounded-xl text-sm" data-id="${p.id}">Buy</button><button class="detail-btn flex-1 border py-2 rounded-xl text-sm hover:bg-gray-100" data-id="${p.id}">View</button></div></div></div>`).join(""); document.querySelectorAll(".buy-btn").forEach(btn=>btn.addEventListener("click",(e)=>{e.stopPropagation(); const prod=products.find(p=>p.id==parseInt(btn.dataset.id)); if(prod) sendWhatsApp(prod);})); document.querySelectorAll(".detail-btn").forEach(btn=>btn.addEventListener("click",(e)=>{e.stopPropagation(); const prod=products.find(p=>p.id==parseInt(btn.dataset.id)); if(prod) openModal(prod);})); }
  let currentModal=null;
  function openModal(p){ currentModal=p; document.getElementById("modalImg").src=p.image; document.getElementById("modalName").innerText=p.name; document.getElementById("modalDesc").innerText=p.desc; document.getElementById("modalPrice").innerHTML=`₦${p.price.toLocaleString()}`; document.getElementById("modal").classList.remove("hidden"); document.getElementById("modal").style.display="flex"; gsap.fromTo("#modal .bg-white",{opacity:0,y:20},{opacity:1,y:0,duration:0.3}); }
  function closeModal(){ document.getElementById("modal").classList.add("hidden"); document.getElementById("modal").style.display="none"; }
  document.getElementById("closeModal").addEventListener("click",closeModal); document.getElementById("modal").addEventListener("click",e=>{if(e.target===document.getElementById("modal")) closeModal();}); document.getElementById("modalWhatsapp").addEventListener("click",()=>{if(currentModal) sendWhatsApp(currentModal);});
  function handleSearch(v){ searchTerm=v.toLowerCase(); renderProducts(); }
  document.getElementById("searchInput")?.addEventListener("input",e=>handleSearch(e.target.value));
  document.getElementById("mobileSearch")?.addEventListener("input",e=>handleSearch(e.target.value));
  // mobile menu
  const menuBtn=document.getElementById("menuBtn"), mobileMenu=document.getElementById("mobileMenu"), overlayDiv=document.getElementById("overlay"), closeMenuBtn=document.getElementById("closeMenu");
  function openMobile(){mobileMenu.classList.add("open");overlayDiv.classList.add("active");document.body.style.overflow="hidden";}
  function closeMobile(){mobileMenu.classList.remove("open");overlayDiv.classList.remove("active");document.body.style.overflow="";}
  menuBtn?.addEventListener("click",openMobile); closeMenuBtn?.addEventListener("click",closeMobile); overlayDiv?.addEventListener("click",closeMobile);
  document.querySelectorAll("#mobileMenu a").forEach(a=>a.addEventListener("click",closeMobile));
  // theme
  const themeBtn=document.getElementById("themeBtn");
  themeBtn.addEventListener("click",()=>{document.body.classList.toggle("dark"); const isDark=document.body.classList.contains("dark"); themeBtn.textContent=isDark?"☀️":"🌙"; localStorage.setItem("theme",isDark?"dark":"light"); gsap.to(themeBtn,{scale:1.2,duration:0.1,yoyo:true,repeat:1});});
  if(localStorage.getItem("theme")==="dark"){document.body.classList.add("dark"); themeBtn.textContent="☀️";}
  renderCats(); renderProducts();
</script>
</body>
</html>
